  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var themeBtn = document.querySelector('.theme-toggle');
      if (themeBtn) themeBtn.addEventListener('click', toggleTheme);
      var menuBtn = document.querySelector('.menu-toggle');
      if (menuBtn) menuBtn.addEventListener('click', toggleMenu);

      var hljsLight = document.getElementById('hljs-light');
      var hljsDark = document.getElementById('hljs-dark');

      function syncHljsTheme() {
        var isDark = document.documentElement.getAttribute('data-theme') === 'dark'
          || (!document.documentElement.hasAttribute('data-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (hljsLight) { hljsLight.media = isDark ? 'not all' : 'all'; hljsLight.disabled = isDark; }
        if (hljsDark) { hljsDark.media = isDark ? 'all' : 'not all'; hljsDark.disabled = !isDark; }
      }

      // Observe data-theme attribute changes
      new MutationObserver(syncHljsTheme).observe(document.documentElement, {
        attributes: true, attributeFilter: ['data-theme']
      });

      // Also sync when system preference changes (for users without manual override)
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', syncHljsTheme);

      syncHljsTheme();
    });
  </script>
